<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliers — MarketPro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script src="app.js"></script>
<script src="sidebar.js"></script>

<!-- Add/Edit Supplier Modal -->
<div class="modal-overlay" id="supplierModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="supplierModalTitle">Add Supplier</div>
      <button class="modal-close" onclick="closeModal('supplierModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editSupplierId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Supplier Name *</label>
          <input type="text" id="sName" class="form-control" placeholder="e.g. Lesotho Flour Mills">
        </div>
        <div class="form-group">
          <label class="form-label">Contact Person</label>
          <input type="text" id="sContact" class="form-control" placeholder="e.g. John Doe">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" id="sPhone" class="form-control" placeholder="+266 XXXXXXXX">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="sEmail" class="form-control" placeholder="supplier@email.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <textarea id="sAddress" class="form-control" rows="2" placeholder="Physical address"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('supplierModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSupplier()">Save Supplier</button>
    </div>
  </div>
</div>

<script>
buildLayout("Suppliers", "suppliers");

(async () => {
  const user = await requireAuth();
  if (!user) return;
  renderSidebarUser(user);

  if (user.role !== "cashier") {
    document.getElementById("topbarActions").innerHTML =
      `<button class="btn btn-primary" onclick="openAddModal()">+ Add Supplier</button>`;
  }

  loadSuppliers();
})();

async function loadSuppliers(search = "") {
  const content = document.getElementById("pageContent");
  content.innerHTML = `
    <div class="filter-bar">
      <div class="search-wrap" style="max-width:360px">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="form-control" placeholder="Search suppliers..." value="${search}" oninput="loadSuppliers(this.value)">
      </div>
    </div>
    <div class="panel">
      <div class="panel-body" style="padding:0" id="suppliersTable">
        <div style="padding:40px;text-align:center"><span class="spinner"></span></div>
      </div>
    </div>
  `;

  try {
    const suppliers = await apiFetch(`/suppliers?search=${encodeURIComponent(search)}`);
    const el = document.getElementById("suppliersTable");

    if (suppliers.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🚚</div><p>No suppliers found.</p></div>`;
      return;
    }

    el.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Name</th><th>Contact Person</th><th>Phone</th><th>Email</th><th>Address</th><th>Actions</th></tr>
          </thead>
          <tbody>
            ${suppliers.map(s => `
              <tr>
                <td><strong>${s.name}</strong></td>
                <td>${s.contact_person || "—"}</td>
                <td>${s.phone || "—"}</td>
                <td style="font-size:.82rem">${s.email || "—"}</td>
                <td style="font-size:.82rem;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.address || "—"}</td>
                <td>
                  <div style="display:flex;gap:6px">
                    <button class="btn btn-ghost btn-sm" onclick='editSupplier(${JSON.stringify(s)})'>✏️ Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteSupplier(${s.supplier_id},'${s.name.replace(/'/g,"\\'")}')">🗑</button>
                  </div>
                </td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
      <div style="padding:12px 18px;font-size:.8rem;color:var(--muted);border-top:1px solid var(--border)">
        ${suppliers.length} supplier${suppliers.length !== 1 ? "s" : ""}
      </div>
    `;
  } catch (err) {
    document.getElementById("suppliersTable").innerHTML =
      `<div class="alert alert-danger" style="margin:16px">${err.message}</div>`;
  }
}

function openAddModal() {
  document.getElementById("supplierModalTitle").textContent = "Add Supplier";
  document.getElementById("editSupplierId").value = "";
  ["sName","sContact","sPhone","sEmail","sAddress"].forEach(id => document.getElementById(id).value = "");
  openModal("supplierModal");
}

function editSupplier(s) {
  document.getElementById("supplierModalTitle").textContent = "Edit Supplier";
  document.getElementById("editSupplierId").value = s.supplier_id;
  document.getElementById("sName").value    = s.name || "";
  document.getElementById("sContact").value = s.contact_person || "";
  document.getElementById("sPhone").value   = s.phone || "";
  document.getElementById("sEmail").value   = s.email || "";
  document.getElementById("sAddress").value = s.address || "";
  openModal("supplierModal");
}

async function saveSupplier() {
  const id   = document.getElementById("editSupplierId").value;
  const body = {
    name:           document.getElementById("sName").value.trim(),
    contact_person: document.getElementById("sContact").value.trim() || null,
    phone:          document.getElementById("sPhone").value.trim()   || null,
    email:          document.getElementById("sEmail").value.trim()   || null,
    address:        document.getElementById("sAddress").value.trim() || null,
  };
  if (!body.name) { toast("Supplier name is required.", "error"); return; }
  try {
    if (id) {
      await apiFetch(`/suppliers/${id}`, "PUT", body);
      toast("Supplier updated.");
    } else {
      await apiFetch("/suppliers", "POST", body);
      toast("Supplier added.");
    }
    closeModal("supplierModal");
    loadSuppliers(document.getElementById("searchInput")?.value || "");
  } catch (err) { toast(err.message, "error"); }
}

async function deleteSupplier(id, name) {
  if (!confirm(`Delete supplier "${name}"? This may affect linked products.`)) return;
  try {
    await apiFetch(`/suppliers/${id}`, "DELETE");
    toast("Supplier deleted.");
    loadSuppliers();
  } catch (err) { toast(err.message, "error"); }
}
</script>
</body>
</html>
