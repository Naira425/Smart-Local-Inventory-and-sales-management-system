<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard | Smart Inventory System</title>
    <link rel="stylesheet" href="owner.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="dashboard-app">
        <div style="display: flex; min-height: 100vh;">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2><i class="fas fa-crown"></i> Owner Panel</h2>
                    <p style="font-size: 0.7rem;">Business Overview | Currency: Maluti (M)</p>
                </div>
                <div class="nav-menu">
                    <div class="nav-link active" data-owner-view="sales-summary">
                        <i class="fas fa-chart-line"></i> Sales Summary
                    </div>
                    <div class="nav-link" data-owner-view="inventory-summary">
                        <i class="fas fa-boxes"></i> Inventory Summary
                    </div>
                    <div class="nav-link" data-owner-view="supplier-summary">
                        <i class="fas fa-truck"></i> Supplier Details
                    </div>
                </div>
            </div>
            <div class="main-content">
                <div class="top-bar">
                    <h1 id="ownerTitle">📊 Sales Summary</h1>
                    <button class="logout-btn" id="ownerLogout"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
                <div id="ownerContent"></div>
            </div>
        </div>
    </div>
    <script src="owner.js"></script>
</body>
</html>
