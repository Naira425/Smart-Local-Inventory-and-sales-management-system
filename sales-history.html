<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales History — MarketPro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script src="app.js"></script>
<script src="sidebar.js"></script>

<!-- Sale Detail Modal -->
<div class="modal-overlay" id="saleDetailModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title" id="saleDetailTitle">Sale Details</div>
      <button class="modal-close" onclick="closeModal('saleDetailModal')">✕</button>
    </div>
    <div class="modal-body" id="saleDetailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('saleDetailModal')">Close</button>
    </div>
  </div>
</div>

<script>
buildLayout("Sales History", "history");

(async () => {
  const user = await requireAuth();
  if (!user) return;
  renderSidebarUser(user);
  renderPage();
})();

function renderPage() {
  const content = document.getElementById("pageContent");
  content.innerHTML = `
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="form-control" placeholder="Search by customer or cashier..." oninput="loadSales()">
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label class="form-label" style="margin:0;white-space:nowrap">From:</label>
        <input type="date" id="dateFrom" class="form-control" style="width:150px" onchange="loadSales()">
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label class="form-label" style="margin:0">To:</label>
        <input type="date" id="dateTo" class="form-control" style="width:150px" onchange="loadSales()">
      </div>
      <button class="btn btn-outline btn-sm" onclick="clearFilters()">Clear</button>
    </div>

    <!-- Summary row -->
    <div id="salesSummary" style="display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap"></div>

    <div class="panel">
      <div class="panel-body" style="padding:0" id="salesTable">
        <div style="padding:40px;text-align:center"><span class="spinner"></span></div>
      </div>
    </div>
  `;
  loadSales();
}

function clearFilters() {
  document.getElementById("searchInput").value = "";
  document.getElementById("dateFrom").value    = "";
  document.getElementById("dateTo").value      = "";
  loadSales();
}

async function loadSales() {
  const search   = document.getElementById("searchInput")?.value.trim() || "";
  const dateFrom = document.getElementById("dateFrom")?.value || "";
  const dateTo   = document.getElementById("dateTo")?.value   || "";

  try {
    const sales = await apiFetch(
      `/sales?search=${encodeURIComponent(search)}&date_from=${dateFrom}&date_to=${dateTo}`
    );
    renderSalesTable(sales);
    renderSummary(sales);
  } catch (err) {
    document.getElementById("salesTable").innerHTML =
      `<div class="alert alert-danger" style="margin:16px">${err.message}</div>`;
  }
}

function renderSummary(sales) {
  const el = document.getElementById("salesSummary");
  if (!el) return;
  const total   = sales.reduce((s, r) => s + parseFloat(r.total_amount), 0);
  const disc    = sales.reduce((s, r) => s + parseFloat(r.discount), 0);
  const methods = {};
  sales.forEach(s => { methods[s.payment_method] = (methods[s.payment_method] || 0) + 1; });
  el.innerHTML = `
    <div class="stat-card" style="padding:14px 18px;flex:1;min-width:150px">
      <div class="card-label">Total Sales</div>
      <div class="card-value" style="font-size:1.4rem">${sales.length}</div>
    </div>
    <div class="stat-card" style="padding:14px 18px;flex:1;min-width:150px">
      <div class="card-label">Total Revenue</div>
      <div class="card-value" style="font-size:1.2rem;color:var(--accent)">${formatMoney(total)}</div>
    </div>
    <div class="stat-card" style="padding:14px 18px;flex:1;min-width:150px">
      <div class="card-label">Total Discounts</div>
      <div class="card-value" style="font-size:1.2rem;color:var(--red)">${formatMoney(disc)}</div>
    </div>
    ${Object.entries(methods).map(([m, c]) =>
      `<div class="stat-card" style="padding:14px 18px;flex:1;min-width:120px">
        <div class="card-label">${m.replace("_"," ")}</div>
        <div class="card-value" style="font-size:1.2rem">${c}</div>
      </div>`).join("")}
  `;
}

function renderSalesTable(sales) {
  const el = document.getElementById("salesTable");
  if (sales.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🧾</div><p>No sales found.</p></div>`;
    return;
  }
  el.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Sale #</th><th>Date & Time</th><th>Customer</th><th>Cashier</th>
            <th>Subtotal</th><th>Discount</th><th>Total</th><th>Paid</th><th>Method</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${sales.map(s => `
            <tr>
              <td><span class="badge badge-gray">#${s.sale_id}</span></td>
              <td style="font-size:.82rem">${formatDateTime(s.sale_date)}</td>
              <td>${s.customer_name}</td>
              <td style="color:var(--muted);font-size:.82rem">${s.cashier_name || "—"}</td>
              <td>${formatMoney(parseFloat(s.total_amount) + parseFloat(s.discount))}</td>
              <td style="color:var(--red)">${s.discount > 0 ? formatMoney(s.discount) : "—"}</td>
              <td style="color:var(--accent);font-weight:700">${formatMoney(s.total_amount)}</td>
              <td>${formatMoney(s.amount_paid)}</td>
              <td>${paymentBadge(s.payment_method)}</td>
              <td>
                <button class="btn btn-ghost btn-sm" onclick="viewSale(${s.sale_id})">👁 View</button>
              </td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>
    <div style="padding:12px 18px;font-size:.8rem;color:var(--muted);border-top:1px solid var(--border)">
      ${sales.length} record${sales.length !== 1 ? "s" : ""} found
    </div>
  `;
}

async function viewSale(saleId) {
  const body  = document.getElementById("saleDetailBody");
  const title = document.getElementById("saleDetailTitle");
  body.innerHTML = `<div style="text-align:center;padding:30px"><span class="spinner"></span></div>`;
  title.textContent = `Sale #${saleId}`;
  openModal("saleDetailModal");

  try {
    const s = await apiFetch(`/sales/${saleId}`);
    body.innerHTML = `
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px">
        <div><div class="form-label">Date</div><div>${formatDateTime(s.sale_date)}</div></div>
        <div><div class="form-label">Customer</div><div>${s.customer_name}</div></div>
        <div><div class="form-label">Cashier</div><div>${s.cashier_name || "—"}</div></div>
        <div><div class="form-label">Payment</div><div>${paymentBadge(s.payment_method)}</div></div>
      </div>
      <div class="table-wrap" style="margin-bottom:16px">
        <table>
          <thead><tr><th>Product</th><th>Qty</th><th>Unit Price</th><th>Subtotal</th></tr></thead>
          <tbody>
            ${(s.items || []).map(i => `
              <tr>
                <td>${i.product_name}</td>
                <td>${i.quantity} ${i.unit}</td>
                <td>${formatMoney(i.unit_price)}</td>
                <td style="color:var(--accent);font-weight:600">${formatMoney(i.subtotal)}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
      <div style="background:var(--surface2);border-radius:var(--radius);padding:14px">
        ${s.discount > 0 ? `<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>Discount</span><span style="color:var(--red)">-${formatMoney(s.discount)}</span></div>` : ""}
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.05rem;color:var(--accent);margin-bottom:6px">
          <span>Total</span><span>${formatMoney(s.total_amount)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Amount Paid</span><span>${formatMoney(s.amount_paid)}</span></div>
        <div style="display:flex;justify-content:space-between;color:var(--green)"><span>Change</span><span>${formatMoney(s.change_given)}</span></div>
      </div>`;
  } catch (err) {
    body.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
  }
}
</script>
</body>
</html>
