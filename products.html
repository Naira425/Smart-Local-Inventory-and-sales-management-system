<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — MarketPro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script src="app.js"></script>
<script src="sidebar.js"></script>

<!-- Add/Edit Product Modal -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="productModalTitle">Add Product</div>
      <button class="modal-close" onclick="closeModal('productModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editProductId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Product Name *</label>
          <input type="text" id="pName" class="form-control" placeholder="e.g. Ace Maize Meal 5kg">
        </div>
        <div class="form-group">
          <label class="form-label">Barcode</label>
          <input type="text" id="pBarcode" class="form-control" placeholder="Scan or type barcode">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="pCategory" class="form-control">
            <option value="">-- Select Category --</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Supplier</label>
          <select id="pSupplier" class="form-control">
            <option value="">-- Select Supplier --</option>
          </select>
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label">Unit</label>
          <select id="pUnit" class="form-control">
            <option value="pcs">pcs</option>
            <option value="kg">kg</option>
            <option value="litre">litre</option>
            <option value="bag">bag</option>
            <option value="box">box</option>
            <option value="bottle">bottle</option>
            <option value="carton">carton</option>
            <option value="tray">tray</option>
            <option value="tube">tube</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Buy Price (M)</label>
          <input type="number" id="pBuyPrice" class="form-control" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label">Sell Price (M) *</label>
          <input type="number" id="pSellPrice" class="form-control" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Stock Quantity</label>
          <input type="number" id="pStock" class="form-control" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Low Stock Alert At</label>
          <input type="number" id="pThreshold" class="form-control" placeholder="10" min="1">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('productModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<!-- Restock Modal -->
<div class="modal-overlay" id="restockModal">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <div class="modal-title">Restock Product</div>
      <button class="modal-close" onclick="closeModal('restockModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="restockProductId">
      <p id="restockProductName" style="font-weight:600;margin-bottom:16px;color:var(--accent)"></p>
      <div class="form-group">
        <label class="form-label">Quantity to Add *</label>
        <input type="number" id="restockQty" class="form-control" placeholder="e.g. 50" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Note (optional)</label>
        <input type="text" id="restockNote" class="form-control" placeholder="e.g. New delivery from supplier">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('restockModal')">Cancel</button>
      <button class="btn btn-primary" onclick="doRestock()">Add Stock</button>
    </div>
  </div>
</div>

<script>
buildLayout("Products", "products");

let categories = [], suppliers = [], allProducts = [];

(async () => {
  const user = await requireAuth();
  if (!user) return;
  renderSidebarUser(user);

  // Topbar action
  if (user.role !== "cashier") {
    document.getElementById("topbarActions").innerHTML = `
      <button class="btn btn-primary" onclick="openModal('productModal')">+ Add Product</button>`;
  }

  await Promise.all([loadCategories(), loadSuppliers()]);
  loadProducts();
})();

async function loadCategories() {
  categories = await apiFetch("/categories");
  const sel = document.getElementById("pCategory");
  categories.forEach(c => {
    sel.innerHTML += `<option value="${c.category_id}">${c.name}</option>`;
  });
}

async function loadSuppliers() {
  suppliers = await apiFetch("/suppliers");
  const sel = document.getElementById("pSupplier");
  suppliers.forEach(s => {
    sel.innerHTML += `<option value="${s.supplier_id}">${s.name}</option>`;
  });
}

async function loadProducts(search = "", catId = "", lowOnly = false) {
  const content = document.getElementById("pageContent");

  // Rebuild filter bar + table container
  content.innerHTML = `
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="form-control" placeholder="Search by name or barcode..." value="${search}" oninput="filterProducts()">
      </div>
      <select id="catFilter" class="form-control" style="width:180px" onchange="filterProducts()">
        <option value="">All Categories</option>
        ${categories.map(c => `<option value="${c.category_id}" ${catId==c.category_id?'selected':''}>${c.name}</option>`).join("")}
      </select>
      <label style="display:flex;align-items:center;gap:8px;font-size:.88rem;cursor:pointer">
        <input type="checkbox" id="lowStockOnly" ${lowOnly?'checked':''} onchange="filterProducts()"> Low Stock Only
      </label>
    </div>
    <div class="panel">
      <div class="panel-body" style="padding:0" id="productsTable">
        <div style="padding:40px;text-align:center"><span class="spinner"></span></div>
      </div>
    </div>
  `;

  // Check URL param
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get("filter") === "low") {
    document.getElementById("lowStockOnly").checked = true;
  }

  await refreshTable();
}

async function refreshTable() {
  const search  = (document.getElementById("searchInput")?.value || "").trim();
  const catId   = document.getElementById("catFilter")?.value || "";
  const lowOnly = document.getElementById("lowStockOnly")?.checked ? "1" : "";

  try {
    let url = `/products?search=${encodeURIComponent(search)}&category_id=${catId}`;
    if (lowOnly) url += "&low_stock=1";
    allProducts = await apiFetch(url);
    renderTable(allProducts);
  } catch (err) {
    document.getElementById("productsTable").innerHTML =
      `<div class="alert alert-danger" style="margin:16px">${err.message}</div>`;
  }
}

function filterProducts() { refreshTable(); }

function renderTable(products) {
  const el = document.getElementById("productsTable");
  if (products.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><p>No products found.</p></div>`;
    return;
  }
  el.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Product</th><th>Barcode</th><th>Category</th><th>Supplier</th>
            <th>Unit</th><th>Buy (M)</th><th>Sell (M)</th><th>Stock</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${products.map(p => `
            <tr>
              <td><strong>${p.name}</strong></td>
              <td style="font-size:.8rem;color:var(--muted)">${p.barcode || "—"}</td>
              <td>${p.category_name || "—"}</td>
              <td style="font-size:.82rem">${p.supplier_name || "—"}</td>
              <td>${p.unit}</td>
              <td>${parseFloat(p.buy_price).toFixed(2)}</td>
              <td style="color:var(--accent);font-weight:600">${parseFloat(p.sell_price).toFixed(2)}</td>
              <td>${stockBadge(p.stock_qty, p.low_stock_threshold)}</td>
              <td>
                <div style="display:flex;gap:6px">
                  <button class="btn btn-ghost btn-sm" title="Restock" onclick='openRestock(${JSON.stringify(p)})'>📥</button>
                  <button class="btn btn-ghost btn-sm" title="Edit" onclick='editProduct(${JSON.stringify(p)})'>✏️</button>
                  <button class="btn btn-danger btn-sm" title="Delete" onclick="deleteProduct(${p.product_id},'${p.name.replace(/'/g,"\\'")}')">🗑</button>
                </div>
              </td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>
    <div style="padding:12px 18px;font-size:.8rem;color:var(--muted);border-top:1px solid var(--border)">
      ${products.length} product${products.length !== 1 ? "s" : ""} found
    </div>
  `;
}

function editProduct(p) {
  document.getElementById("productModalTitle").textContent = "Edit Product";
  document.getElementById("editProductId").value = p.product_id;
  document.getElementById("pName").value       = p.name;
  document.getElementById("pBarcode").value    = p.barcode || "";
  document.getElementById("pCategory").value   = p.category_id || "";
  document.getElementById("pSupplier").value   = p.supplier_id || "";
  document.getElementById("pUnit").value       = p.unit;
  document.getElementById("pBuyPrice").value   = p.buy_price;
  document.getElementById("pSellPrice").value  = p.sell_price;
  document.getElementById("pStock").value      = p.stock_qty;
  document.getElementById("pThreshold").value  = p.low_stock_threshold;
  openModal("productModal");
}

async function saveProduct() {
  const id = document.getElementById("editProductId").value;
  const body = {
    name:               document.getElementById("pName").value.trim(),
    barcode:            document.getElementById("pBarcode").value.trim() || null,
    category_id:        document.getElementById("pCategory").value || null,
    supplier_id:        document.getElementById("pSupplier").value || null,
    unit:               document.getElementById("pUnit").value,
    buy_price:          parseFloat(document.getElementById("pBuyPrice").value) || 0,
    sell_price:         parseFloat(document.getElementById("pSellPrice").value) || 0,
    stock_qty:          parseInt(document.getElementById("pStock").value) || 0,
    low_stock_threshold:parseInt(document.getElementById("pThreshold").value) || 10,
  };
  if (!body.name) { toast("Product name is required.", "error"); return; }
  try {
    if (id) {
      await apiFetch(`/products/${id}`, "PUT", body);
      toast("Product updated.");
    } else {
      await apiFetch("/products", "POST", body);
      toast("Product added.");
    }
    document.getElementById("editProductId").value = "";
    document.getElementById("productModalTitle").textContent = "Add Product";
    closeModal("productModal");
    refreshTable();
  } catch (err) { toast(err.message, "error"); }
}

async function deleteProduct(id, name) {
  if (!confirm(`Remove "${name}" from active products?`)) return;
  try {
    await apiFetch(`/products/${id}`, "DELETE");
    toast("Product removed.");
    refreshTable();
  } catch (err) { toast(err.message, "error"); }
}

function openRestock(p) {
  document.getElementById("restockProductId").value = p.product_id;
  document.getElementById("restockProductName").textContent = `${p.name} — Current Stock: ${p.stock_qty} ${p.unit}`;
  document.getElementById("restockQty").value  = "";
  document.getElementById("restockNote").value = "";
  openModal("restockModal");
}

async function doRestock() {
  const id  = document.getElementById("restockProductId").value;
  const qty = parseInt(document.getElementById("restockQty").value);
  if (!qty || qty < 1) { toast("Enter a valid quantity.", "error"); return; }
  try {
    const res = await apiFetch(`/products/${id}/restock`, "POST", {
      quantity: qty,
      note: document.getElementById("restockNote").value
    });
    toast(res.message);
    closeModal("restockModal");
    refreshTable();
  } catch (err) { toast(err.message, "error"); }
}
</script>
</body>
</html>
