<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market System — Login</title>
<link rel="stylesheet" href="style.css">
<style>body { display: block; }</style>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-circle">🛒</div>
      <h1>MarketPro</h1>
      <p>Inventory & Sales Management</p>
    </div>

    <div id="loginError" class="alert alert-danger" style="display:none"></div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" id="loginBtn" onclick="doLogin()">
      Sign In
    </button>

    <p style="font-size:.78rem;color:var(--muted);text-align:center;margin-top:20px">
      Default: <strong>admin</strong> / <strong>admin123</strong>
    </p>
  </div>
</div>

<script src="app.js"></script>
<script>
// If already logged in, go straight to dashboard
if (localStorage.getItem("market_user")) {
  window.location.href = "dashboard.html";
}

async function doLogin() {
  const btn    = document.getElementById("loginBtn");
  const errEl  = document.getElementById("loginError");
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  errEl.style.display = "none";
  if (!username || !password) {
    errEl.textContent = "Please enter username and password.";
    errEl.style.display = "flex";
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> Signing in...`;

  try {
    const data = await apiFetch("/login", "POST", { username, password });
    // Save user info to localStorage so all pages can access it
    localStorage.setItem("market_user", JSON.stringify(data.user));
    window.location.href = "dashboard.html";
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = "flex";
    btn.disabled = false;
    btn.innerHTML = "Sign In";
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});
</script>
</body>
</html>
