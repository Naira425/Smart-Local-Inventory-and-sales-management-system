<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers — MarketPro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script src="app.js"></script>
<script src="sidebar.js"></script>

<!-- Add Customer Modal -->
<div class="modal-overlay" id="customerModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <div class="modal-title" id="customerModalTitle">Add Customer</div>
      <button class="modal-close" onclick="closeModal('customerModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editCustomerId">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" id="cName" class="form-control" placeholder="Customer name">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" id="cPhone" class="form-control" placeholder="+266 XXXXXXXX">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="cEmail" class="form-control" placeholder="email@example.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <textarea id="cAddress" class="form-control" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('customerModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer()">Save Customer</button>
    </div>
  </div>
</div>

<script>
buildLayout("Customers", "customers");

(async () => {
  const user = await requireAuth();
  if (!user) return;
  renderSidebarUser(user);
  document.getElementById("topbarActions").innerHTML =
    `<button class="btn btn-primary" onclick="openAddModal()">+ Add Customer</button>`;
  loadCustomers();
})();

async function loadCustomers(search = "") {
  const content = document.getElementById("pageContent");
  content.innerHTML = `
    <div class="filter-bar">
      <div class="search-wrap" style="max-width:360px">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="form-control" placeholder="Search by name or phone..." value="${search}" oninput="loadCustomers(this.value)">
      </div>
    </div>
    <div class="panel">
      <div class="panel-body" style="padding:0" id="customersTable">
        <div style="padding:40px;text-align:center"><span class="spinner"></span></div>
      </div>
    </div>`;

  try {
    const customers = await apiFetch(`/customers?search=${encodeURIComponent(search)}`);
    const el = document.getElementById("customersTable");

    if (customers.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><p>No customers found.</p></div>`;
      return;
    }

    el.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Email</th><th>Address</th><th>Registered</th><th>Actions</th></tr></thead>
          <tbody>
            ${customers.map(c => `
              <tr>
                <td style="color:var(--muted)">${c.customer_id}</td>
                <td><strong>${c.name}</strong></td>
                <td>${c.phone || "—"}</td>
                <td style="font-size:.82rem">${c.email || "—"}</td>
                <td style="font-size:.82rem">${c.address || "—"}</td>
                <td style="font-size:.8rem;color:var(--muted)">${formatDate(c.created_at)}</td>
                <td>
                  <button class="btn btn-ghost btn-sm" onclick='editCustomer(${JSON.stringify(c)})'>✏️</button>
                </td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
      <div style="padding:12px 18px;font-size:.8rem;color:var(--muted);border-top:1px solid var(--border)">
        ${customers.length} customer${customers.length !== 1 ? "s" : ""}
      </div>`;
  } catch (err) {
    document.getElementById("customersTable").innerHTML =
      `<div class="alert alert-danger" style="margin:16px">${err.message}</div>`;
  }
}

function openAddModal() {
  document.getElementById("customerModalTitle").textContent = "Add Customer";
  document.getElementById("editCustomerId").value = "";
  ["cName","cPhone","cEmail","cAddress"].forEach(id => document.getElementById(id).value = "");
  openModal("customerModal");
}

function editCustomer(c) {
  document.getElementById("customerModalTitle").textContent = "Edit Customer";
  document.getElementById("editCustomerId").value = c.customer_id;
  document.getElementById("cName").value    = c.name || "";
  document.getElementById("cPhone").value   = c.phone || "";
  document.getElementById("cEmail").value   = c.email || "";
  document.getElementById("cAddress").value = c.address || "";
  openModal("customerModal");
}

async function saveCustomer() {
  const id   = document.getElementById("editCustomerId").value;
  const body = {
    name:    document.getElementById("cName").value.trim(),
    phone:   document.getElementById("cPhone").value.trim()   || null,
    email:   document.getElementById("cEmail").value.trim()   || null,
    address: document.getElementById("cAddress").value.trim() || null,
  };
  if (!body.name) { toast("Customer name is required.", "error"); return; }
  try {
    if (id) {
      // Using generic POST since we didn't build a PUT for customers — easy to add
      toast("Edit not implemented yet — add PUT /api/customers/:id in app.py", "warning");
    } else {
      await apiFetch("/customers", "POST", body);
      toast("Customer added.");
    }
    closeModal("customerModal");
    loadCustomers();
  } catch (err) { toast(err.message, "error"); }
}
</script>
</body>
</html>
