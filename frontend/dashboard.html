<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — MarketPro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script src="app.js"></script>
<script src="sidebar.js"></script>
<script>
buildLayout("Dashboard", "dashboard");

(async () => {
  const user = await requireAuth();
  if (!user) return;
  renderSidebarUser(user);
  loadDashboard();
})();

async function loadDashboard() {
  const content = document.getElementById("pageContent");
  try {
    const d = await apiFetch("/dashboard");

    const weekLabels = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
    const weekData   = d.weekly_chart || [];
    // Build simple bar chart data
    const maxRev = Math.max(...weekData.map(w => w.total), 1);

    content.innerHTML = `
      <!-- Stat Cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="card-icon" style="background:rgba(245,166,35,.15)">📦</div>
          <div class="card-value">${d.total_products}</div>
          <div class="card-label">Active Products</div>
        </div>
        <div class="stat-card">
          <div class="card-icon" style="background:rgba(255,77,109,.15)">⚠️</div>
          <div class="card-value" style="color:var(--red)">${d.low_stock}</div>
          <div class="card-label">Low Stock Alerts</div>
        </div>
        <div class="stat-card">
          <div class="card-icon" style="background:rgba(34,201,132,.15)">🧾</div>
          <div class="card-value">${d.sales_today}</div>
          <div class="card-label">Sales Today</div>
        </div>
        <div class="stat-card">
          <div class="card-icon" style="background:rgba(77,159,255,.15)">💰</div>
          <div class="card-value" style="color:var(--accent)">${formatMoney(d.revenue_today)}</div>
          <div class="card-label">Revenue Today</div>
        </div>
        <div class="stat-card">
          <div class="card-icon" style="background:rgba(245,166,35,.1)">📅</div>
          <div class="card-value">${formatMoney(d.revenue_month)}</div>
          <div class="card-label">Revenue This Month</div>
        </div>
      </div>

      <div class="grid-2" style="gap:20px;margin-bottom:20px">
        <!-- Weekly Revenue Chart -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">📈 Revenue Last 7 Days</div>
          </div>
          <div class="panel-body">
            <div id="weekChart" style="display:flex;align-items:flex-end;gap:10px;height:140px;padding-bottom:8px">
              ${weekData.length === 0
                ? '<div class="empty-state" style="width:100%"><p>No data yet</p></div>'
                : weekData.map(w => {
                    const pct = (w.total / maxRev * 100).toFixed(1);
                    const label = new Date(w.day).toLocaleDateString("en-GB",{weekday:"short"});
                    return `
                      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
                        <span style="font-size:.68rem;color:var(--muted)">${formatMoney(w.total).replace("M ","")}</span>
                        <div style="width:100%;background:var(--surface2);border-radius:4px;height:${Math.max(pct,4)}%;
                                    background:linear-gradient(to top,var(--accent2),var(--accent));border-radius:4px 4px 0 0;
                                    min-height:4px;transition:height .4s ease"></div>
                        <span style="font-size:.7rem;color:var(--muted)">${label}</span>
                      </div>`;
                  }).join("")
              }
            </div>
          </div>
        </div>

        <!-- Top Products -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">🏆 Top Products This Month</div>
          </div>
          <div class="panel-body" style="padding:0">
            ${d.top_products.length === 0
              ? '<div class="empty-state"><p>No sales data yet</p></div>'
              : `<table>
                  <thead><tr><th>#</th><th>Product</th><th>Qty Sold</th></tr></thead>
                  <tbody>
                    ${d.top_products.map((p,i) => `
                      <tr>
                        <td><span class="badge badge-orange">${i+1}</span></td>
                        <td>${p.name}</td>
                        <td><strong>${p.qty_sold}</strong></td>
                      </tr>`).join("")}
                  </tbody>
                </table>`}
          </div>
        </div>
      </div>

      <div class="grid-2" style="gap:20px">
        <!-- Recent Sales -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">🧾 Recent Sales</div>
            <a href="sales-history.html" class="btn btn-outline btn-sm">View All</a>
          </div>
          <div class="panel-body" style="padding:0">
            ${d.recent_sales.length === 0
              ? '<div class="empty-state"><p>No sales yet today</p></div>'
              : `<table>
                  <thead><tr><th>ID</th><th>Customer</th><th>Total</th><th>Method</th><th>Time</th></tr></thead>
                  <tbody>
                    ${d.recent_sales.map(s => `
                      <tr>
                        <td><span class="badge badge-gray">#${s.sale_id}</span></td>
                        <td>${s.customer_name}</td>
                        <td style="color:var(--accent);font-weight:700">${formatMoney(s.total_amount)}</td>
                        <td>${paymentBadge(s.payment_method)}</td>
                        <td style="color:var(--muted);font-size:.8rem">${timeAgo(s.sale_date)}</td>
                      </tr>`).join("")}
                  </tbody>
                </table>`}
          </div>
        </div>

        <!-- Low Stock Alerts -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">⚠️ Low Stock Alerts</div>
            <a href="products.html?filter=low" class="btn btn-outline btn-sm">View All</a>
          </div>
          <div class="panel-body" style="padding:0">
            ${d.low_stock_items.length === 0
              ? '<div class="empty-state"><div class="empty-icon">✅</div><p>All stock levels OK</p></div>'
              : `<table>
                  <thead><tr><th>Product</th><th>Category</th><th>Stock</th></tr></thead>
                  <tbody>
                    ${d.low_stock_items.map(p => {
                        const pct = Math.max((p.stock_qty / p.low_stock_threshold) * 100, 0);
                        const cls = p.stock_qty === 0 ? "critical" : "low";
                        return `
                          <tr>
                            <td>
                              <div>${p.name}</div>
                              <div class="stock-bar">
                                <div class="stock-bar-fill ${cls}" style="width:${Math.min(pct,100)}%"></div>
                              </div>
                            </td>
                            <td style="color:var(--muted);font-size:.8rem">${p.category || "—"}</td>
                            <td>${stockBadge(p.stock_qty, p.low_stock_threshold)}</td>
                          </tr>`;
                      }).join("")}
                  </tbody>
                </table>`}
          </div>
        </div>
      </div>
    `;
  } catch (err) {
    content.innerHTML = `<div class="alert alert-danger">Failed to load dashboard: ${err.message}</div>`;
  }
}
</script>
</body>
</html>
