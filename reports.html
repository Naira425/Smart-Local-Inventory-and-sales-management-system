<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — MarketPro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script src="app.js"></script>
<script src="sidebar.js"></script>

<script>
buildLayout("Reports & Analytics", "reports");

(async () => {
  const user = await requireAuth();
  if (!user) return;
  renderSidebarUser(user);
  renderPage();
})();

function renderPage() {
  const content = document.getElementById("pageContent");

  // Default date range: this month
  const now   = new Date();
  const from  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-01`;
  const today = now.toISOString().slice(0,10);

  content.innerHTML = `
    <!-- Date Range Picker -->
    <div class="panel" style="margin-bottom:20px">
      <div class="panel-body">
        <div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:8px">
            <label class="form-label" style="margin:0;white-space:nowrap">From:</label>
            <input type="date" id="reportFrom" class="form-control" style="width:160px" value="${from}">
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <label class="form-label" style="margin:0">To:</label>
            <input type="date" id="reportTo" class="form-control" style="width:160px" value="${today}">
          </div>
          <button class="btn btn-primary" onclick="loadAllReports()">📊 Generate Reports</button>
          <button class="btn btn-outline btn-sm" onclick="setRange('today')">Today</button>
          <button class="btn btn-outline btn-sm" onclick="setRange('week')">This Week</button>
          <button class="btn btn-outline btn-sm" onclick="setRange('month')">This Month</button>
        </div>
      </div>
    </div>

    <!-- Report Panels -->
    <div class="grid-2" style="gap:20px;margin-bottom:20px">
      <div class="panel" id="dailySummaryPanel">
        <div class="panel-header"><div class="panel-title">📅 Daily Sales Summary</div></div>
        <div class="panel-body" style="padding:0" id="dailySummaryBody">
          <div style="padding:30px;text-align:center"><span class="spinner"></span></div>
        </div>
      </div>

      <div class="panel" id="categoryPanel">
        <div class="panel-header"><div class="panel-title">🗂 Sales by Category</div></div>
        <div class="panel-body" style="padding:0" id="categoryBody">
          <div style="padding:30px;text-align:center"><span class="spinner"></span></div>
        </div>
      </div>
    </div>

    <div class="grid-2" style="gap:20px">
      <div class="panel" id="topProductsPanel">
        <div class="panel-header">
          <div class="panel-title">🏆 Top Selling Products</div>
        </div>
        <div class="panel-body" style="padding:0" id="topProductsBody">
          <div style="padding:30px;text-align:center"><span class="spinner"></span></div>
        </div>
      </div>

      <div class="panel" id="lowStockPanel">
        <div class="panel-header"><div class="panel-title">⚠️ Current Low Stock</div></div>
        <div class="panel-body" style="padding:0" id="lowStockBody">
          <div style="padding:30px;text-align:center"><span class="spinner"></span></div>
        </div>
      </div>
    </div>
  `;

  loadAllReports();
}

function setRange(type) {
  const now  = new Date();
  let from, to = now.toISOString().slice(0,10);
  if (type === "today") {
    from = to;
  } else if (type === "week") {
    const d = new Date(now);
    d.setDate(d.getDate() - d.getDay() + 1);
    from = d.toISOString().slice(0,10);
  } else {
    from = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-01`;
  }
  document.getElementById("reportFrom").value = from;
  document.getElementById("reportTo").value   = to;
  loadAllReports();
}

async function loadAllReports() {
  const from = document.getElementById("reportFrom")?.value || "";
  const to   = document.getElementById("reportTo")?.value   || "";
  await Promise.all([
    loadDailySummary(from, to),
    loadCategoryReport(from, to),
    loadTopProducts(from, to),
    loadLowStock()
  ]);
}

async function loadDailySummary(from, to) {
  const el = document.getElementById("dailySummaryBody");
  try {
    const rows = await apiFetch(`/reports/daily-summary?date_from=${from}&date_to=${to}`);
    if (rows.length === 0) {
      el.innerHTML = `<div class="empty-state"><p>No sales in this range.</p></div>`;
      return;
    }
    const totalRev = rows.reduce((s, r) => s + r.revenue, 0);
    el.innerHTML = `
      <div style="padding:12px 18px;font-size:.82rem;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600">
        Total: ${formatMoney(totalRev)} across ${rows.length} day${rows.length!==1?"s":""}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Sales</th><th>Revenue</th><th>Discounts</th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${formatDate(r.sale_day)}</td>
                <td>${r.num_sales}</td>
                <td style="color:var(--accent);font-weight:600">${formatMoney(r.revenue)}</td>
                <td style="color:var(--red)">${r.total_discount > 0 ? formatMoney(r.total_discount) : "—"}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>`;
  } catch (err) {
    el.innerHTML = `<div class="alert alert-danger" style="margin:16px">${err.message}</div>`;
  }
}

async function loadCategoryReport(from, to) {
  const el = document.getElementById("categoryBody");
  try {
    const rows = await apiFetch(`/reports/sales-by-category?date_from=${from}&date_to=${to}`);
    if (rows.length === 0) {
      el.innerHTML = `<div class="empty-state"><p>No data in this range.</p></div>`;
      return;
    }
    const maxRev = Math.max(...rows.map(r => parseFloat(r.revenue)));
    el.innerHTML = `
      <div style="padding:14px 18px">
        ${rows.map(r => {
          const pct = ((parseFloat(r.revenue) / maxRev) * 100).toFixed(1);
          return `
            <div style="margin-bottom:14px">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px">
                <span style="font-size:.88rem;font-weight:600">${r.category}</span>
                <span style="font-size:.82rem;color:var(--accent)">${formatMoney(r.revenue)}</span>
              </div>
              <div class="stock-bar" style="height:8px">
                <div class="stock-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--accent2),var(--accent))"></div>
              </div>
              <div style="font-size:.75rem;color:var(--muted);margin-top:3px">${r.qty_sold} units sold</div>
            </div>`;
        }).join("")}
      </div>`;
  } catch (err) {
    el.innerHTML = `<div class="alert alert-danger" style="margin:16px">${err.message}</div>`;
  }
}

async function loadTopProducts(from, to) {
  const el = document.getElementById("topProductsBody");
  try {
    const rows = await apiFetch(`/reports/top-products?date_from=${from}&date_to=${to}&limit=10`);
    if (rows.length === 0) {
      el.innerHTML = `<div class="empty-state"><p>No sales data in this range.</p></div>`;
      return;
    }
    el.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Product</th><th>Unit</th><th>Qty Sold</th><th>Revenue</th></tr></thead>
          <tbody>
            ${rows.map((r,i) => `
              <tr>
                <td><span class="badge ${i<3?'badge-orange':'badge-gray'}">${i+1}</span></td>
                <td><strong>${r.name}</strong></td>
                <td style="color:var(--muted)">${r.unit}</td>
                <td>${r.qty_sold}</td>
                <td style="color:var(--accent);font-weight:600">${formatMoney(r.revenue)}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>`;
  } catch (err) {
    el.innerHTML = `<div class="alert alert-danger" style="margin:16px">${err.message}</div>`;
  }
}

async function loadLowStock() {
  const el = document.getElementById("lowStockBody");
  try {
    const rows = await apiFetch("/reports/low-stock");
    if (rows.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><p>All products adequately stocked.</p></div>`;
      return;
    }
    el.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Product</th><th>Category</th><th>Supplier</th><th>Stock</th><th>Alert At</th></tr></thead>
          <tbody>
            ${rows.map(p => `
              <tr>
                <td><strong>${p.name}</strong></td>
                <td style="font-size:.82rem">${p.category || "—"}</td>
                <td style="font-size:.82rem">${p.supplier || "—"}</td>
                <td>${stockBadge(p.stock_qty, p.low_stock_threshold)}</td>
                <td style="color:var(--muted)">${p.low_stock_threshold}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>`;
  } catch (err) {
    el.innerHTML = `<div class="alert alert-danger" style="margin:16px">${err.message}</div>`;
  }
}
</script>
</body>
</html>
